<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/telaCadastro.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=visibility" />
    <title>Inscreva-se</title>
</head>

<body>
    <header class="header">
        <h1>Inscreva-se</h1>

        <div>

            <img src="./assets/icones/Icone-menu.svg" alt="icone menu">
        </div>
    </header>
    <main class="main">

        <section>
            <form class="form-container" action="#">
                <div class="form-itens nome">
                    <label for="nome">Nome</label>
                    <input id="nome" type="text" required placeholder="Ingrid silva">

                </div>

                <div class="form-itens email">
                    <label for="email">Email</label>
                    <input id="email" type="text" required placeholder="email@">
                </div>

                <div class="form-itens senha">

                    <label for="senha">Senha</label>
                    <input id="senha" type="password" required>
                    <img  src="./assets/icones/senha-olho.svg" alt="visibility" class="visible">
                </div>

                <div class="btn-container">
                    <input id="btnCadastrar" type="button" value="cadastrar">

                    <a href="#">Já possui conta?</a>
                </div>
            </form>

        </section>
    </main>
</body>

</html>
